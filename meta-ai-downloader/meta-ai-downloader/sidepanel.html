<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta AI Media Downloader</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0b0d;
      color: #e2e2e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #0070ff, #00c2ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,112,255,0.3);
    }

    .logo svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title h1 {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .title p {
      font-size: 11px;
      color: #777;
      margin-top: 1px;
    }

    /* Status */
    .status-bar {
      padding: 10px 18px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e66;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 12px;
      color: #888;
    }

    .status-text strong {
      color: #ccc;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      padding: 10px 18px;
      border-bottom: 1px solid #1e1e24;
      flex-shrink: 0;
    }

    .filter-btn {
      flex: 1;
      padding: 7px 0;
      border-radius: 8px;
      border: 1px solid #2a2a30;
      background: #141418;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: #3a3a44;
      color: #aaa;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #0070ff, #005ce6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,112,255,0.25);
    }

    /* Media List */
    .media-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
    }

    .media-list::-webkit-scrollbar {
      width: 6px;
    }

    .media-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .media-list::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    .media-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #141418;
      border: 1px solid #1e1e24;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: border-color 0.2s ease, transform 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .media-item:hover {
      border-color: #2a2a34;
      transform: translateX(2px);
    }

    .media-thumb {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #1a1a20;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #25252c;
    }

    .media-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-thumb .icon {
      width: 20px;
      height: 20px;
      color: #555;
    }

    .media-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .media-type {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #0070ff;
    }

    .media-type.image {
      color: #a855f7;
    }

    .media-name {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .media-url {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dl-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #2a2a30;
      background: #1a1a20;
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .dl-btn:hover {
      background: linear-gradient(135deg, #0070ff, #005ce6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,112,255,0.3);
    }

    .dl-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dl-btn.loading svg {
      animation: spin 0.8s linear infinite;
    }

    .dl-btn.success {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      border-color: transparent;
      color: #fff;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #444;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
      stroke: #333;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Footer */
    .footer {
      padding: 10px 18px;
      border-top: 1px solid #1e1e24;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      font-size: 11px;
      color: #333;
    }

    .footer a {
      color: #0070ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </div>
    <div class="title">
      <h1>Meta AI Downloader</h1>
      <p>Video ve gorsel indirici</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot active" id="statusDot"></div>
    <div class="status-text">
      Sayfa taraniyor... <strong id="countText">0 medya bulundu</strong>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Tumu</button>
    <button class="filter-btn" data-filter="video">Videolar</button>
    <button class="filter-btn" data-filter="image">Gorseller</button>
  </div>

  <div class="media-list" id="mediaList">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Henüz medya bulunamadi.</p>
    </div>
  </div>

  <div class="footer">
    <span>Made with love</span>
    <span class="version">v2.0.0</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
